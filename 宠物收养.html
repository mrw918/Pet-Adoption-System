    <!-- Tailwind CSS CDN (生产环境建议本地引入) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        
        :root {
            --primary: #ff4d4f;
        }
        
        * {
            font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
        }
        
        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 
                        0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        
        .card-image {
            height: 220px;
            object-fit: cover;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }
        
        .status-badge {
            animation: pulse 2s infinite;
        }
        
        .price-tag {
            background: linear-gradient(90deg, #ff4d4f, #ff7875);
        }
    </style>
</head>

        // 渲染卡片函数（高度仿图片中的商品卡片布局）
        function renderPetCards(filteredPets) {
            const grid = document.getElementById('petGrid')
            grid.innerHTML = ''

            filteredPets.forEach(pet => {
                const cardHTML = `
                <div class="product-card bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-sm group">
                    <!-- 宠物照片 -->
                    <div class="relative">
                        <img src="${pet.imageUrl}" 
                             alt="${pet.name}" 
                             class="card-image w-full">
                        
                        <!-- 状态徽章 -->
                        ${pet.status === '待领养' 
                            ? `<div class="status-badge absolute top-4 left-4 bg-emerald-500 text-white text-xs font-medium px-3 py-1 rounded-3xl flex items-center gap-1 shadow-inner">
                                <span class="text-base leading-none">🐾</span> 待领养
                               </div>` 
                            : `<div class="status-badge absolute top-4 left-4 bg-amber-500 text-white text-xs font-medium px-3 py-1 rounded-3xl flex items-center gap-1 shadow-inner">
                                <span class="text-base leading-none">📅</span> 已预约
                               </div>`}
                        
                        <!-- 仿图片右上角价格标签 -->
                        <div class="price-tag absolute top-4 right-4 text-white text-sm font-semibold px-4 h-7 flex items-center rounded-3xl shadow-md">
                            ${pet.priceTag}
                        </div>
                    </div>

                    <!-- 卡片内容 -->
                    <div class="p-4">
                        <!-- 宠物名字 -->
                        <div class="flex justify-between items-start">
                            <h3 class="text-2xl font-bold text-gray-900">${pet.name}</h3>
                            <span class="text-3xl">${pet.gender === '雄性' ? '♂' : '♀'}</span>
                        </div>
                        
                        <!-- 品种 -->
                        <p class="text-[#ff4d4f] font-medium mt-1">${pet.breed}</p>
                        
                        <!-- 详细信息 -->
                        <div class="mt-4 grid grid-cols-2 gap-y-3 text-sm">
                            <div>
                                <span class="text-gray-400 text-xs block">年龄</span>
                                <span class="font-medium">${pet.age}</span>
                            </div>
                            <div>
                                <span class="text-gray-400 text-xs block">健康状况</span>
                                <span class="font-medium text-emerald-600">${pet.health}</span>
                            </div>
                            <div class="col-span-2">
                                <span class="text-gray-400 text-xs block">领养状态</span>
                                <span class="inline-flex items-center px-3 py-0.5 rounded-3xl text-xs font-medium ${pet.status === '待领养' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}">
                                    ${pet.status}
                                </span>
                            </div>
                        </div>

                        <!-- 分割线 -->
                        <div class="my-4 border-t border-dashed"></div>
                        
                        <!-- 底部仿图片已售信息 -->
                        <div class="flex items-center justify-between text-xs">
                            <span class="text-gray-500">${pet.soldText}</span>
                            <button onclick="applyAdopt(${pet.id})" 
                                    class="bg-[#ff4d4f] hover:bg-[#ff3838] text-white text-sm font-medium px-6 py-2 rounded-3xl transition-colors flex items-center gap-2 group-hover:scale-105">
                                立即申请领养
                                <span class="text-lg">→</span>
                            </button>
                        </div>
                    </div>
                </div>`

                grid.innerHTML += cardHTML
            })

            // 更新总数
            document.getElementById('totalCount').textContent = filteredPets.length
        }

        // 申请领养按钮事件（演示）
        function applyAdopt(id) {
            const pet = petsData.find(p => p.id === id)
            if (pet) {
                alert(`🎉 您已成功申请领养「${pet.name}」\n\n系统已将您的申请提交至领养审核中心\n\n请准备好：\n1. 身份证/回乡证\n2. 居住地址证明\n3. 领养协议签署\n\n审核结果将在 48 小时内通知您！`)
            }
        }

        // 状态筛选
        function filterByStatus(status) {
            let filtered = petsData
            
            if (status !== 'all') {
                filtered = petsData.filter(pet => pet.status === status)
            }
            
            renderPetCards(filtered)
            
            // 高亮当前筛选按钮（简单实现）
            console.log(`%c已筛选：${status === 'all' ? '全部' : status}`, 'color:#ff4d4f;font-weight:600')
        }

        // 搜索功能
        function initSearch() {
            const searchInput = document.getElementById('searchInput')
            searchInput.addEventListener('input', (e) => {
                const keyword = e.target.value.toLowerCase().trim()
                
                if (!keyword) {
                    renderPetCards(petsData)
                    return
                }
                
                const filtered = petsData.filter(pet => 
                    pet.name.toLowerCase().includes(keyword) ||
                    pet.breed.toLowerCase().includes(keyword) ||
                    pet.age.toLowerCase().includes(keyword)
                )
                
                renderPetCards(filtered)
            })
        }

        // 初始化页面
        function initialize() {
            // Tailwind 配置
            return {
                config(userConfig = {}) {
                    return {
                        configUser: userConfig,
                        theme: {
                            extend: {
                                colors: {
                                    primary: '#ff4d4f'
                                }
                            }
                        }
                    }
                },
                theme: {
                    extend: {}
                }
            }
        }

        // 启动
        window.onload = function() {
            const config = initialize().config()
            const tailConfig = config.theme.extend
            // 渲染全部宠物
            renderPetCards(petsData)
            // 初始化搜索
            initSearch()
            
            console.log('%c✅ 宠物领养网页原型已成功初始化\n仿照图片电商卡片界面设计完成\n包含所有指定字段：名字、品种、年龄、性别、健康状况、领养状态、照片', 'color:#ff4d4f;font-size:13px;font-weight:600')
        }
    </script>
